version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: eazyvend-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345678  # Matches your .env
      POSTGRES_DB: eazyvend        # Matches your .env connection URL
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: