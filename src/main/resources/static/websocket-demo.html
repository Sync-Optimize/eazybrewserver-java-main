<!DOCTYPE html>
<https://dev.eazybrewserver.com/html>
<head>
    <title>WebSocket Transaction Notifications Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            color: #333;
        }
        .card {
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 20px;
            background-color: #f9f9f9;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        pre {
            background-color: #f5f5f5;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
        .status {
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 4px;
        }
        .connected {
            background-color: #dff0d8;
            color: #3c763d;
        }
        .disconnected {
            background-color: #f2dede;
            color: #a94442;
        }
        .message {
            margin-bottom: 10px;
            padding: 10px;
            background-color: #e8f4f8;
            border-left: 4px solid #5bc0de;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>WebSocket Transaction Notifications Demo</h1>
        
        <div class="card">
            <div class="form-group">
                <label for="connection-status">Connection Status:</label>
                <div id="connection-status" class="status disconnected">Disconnected</div>
            </div>
            
            <div class="form-group">
                <button id="connect" onclick="connect()">Connect</button>
                <button id="disconnect" onclick="disconnect()" disabled>Disconnect</button>
            </div>
        </div>
        
        <div class="card">
            <h2>Subscription Options</h2>
            <div class="form-group">
                <label for="company-id">Company ID:</label>
                <input type="text" id="company-id" placeholder="Enter company ID">
                <button onclick="subscribeToCompany()">Subscribe to Company</button>
            </div>
            
            <div class="form-group">
                <label for="staff-id">Staff ID:</label>
                <input type="text" id="staff-id" placeholder="Enter staff ID">
                <button onclick="subscribeToStaff()">Subscribe to Staff</button>
            </div>
            
            <div class="form-group">
                <label for="device-id">Device ID:</label>
                <input type="text" id="device-id" placeholder="Enter device ID">
                <button onclick="subscribeToDevice()">Subscribe to Device</button>
            </div>
            
            <div class="form-group">
                <button onclick="subscribeToAll()">Subscribe to All Transactions</button>
            </div>
        </div>
        
        <div class="card">
            <h2>Messages</h2>
            <div id="messages"></div>
        </div>
    </div>
    
    <script>
        let stompClient = null;
        let subscriptions = [];
        
        function connect() {
            const socket = new SockJS('https://dev.eazybrewserver.com/ws');
            stompClient = Stomp.over(socket);

            stompClient.connect({}, function(frame) {
                console.log('Connected: ' + frame);
                document.getElementById('connection-status').textContent = 'Connected';
                document.getElementById('connection-status').className = 'status connected';
                document.getElementById('connect').disabled = true;
                document.getElementById('disconnect').disabled = false;
            }, function(error) {
                console.error('STOMP error: ' + error);
                document.getElementById('connection-status').textContent = 'Error: ' + error;
                document.getElementById('connection-status').className = 'status disconnected';
            });
        }
        
        function disconnect() {
            if (stompClient !== null) {
                // Unsubscribe from all topics
                subscriptions.forEach(subscription => subscription.unsubscribe());
                subscriptions = [];
                
                stompClient.disconnect();
                stompClient = null;
                
                document.getElementById('connection-status').textContent = 'Disconnected';
                document.getElementById('connection-status').className = 'status disconnected';
                document.getElementById('connect').disabled = false;
                document.getElementById('disconnect').disabled = true;
                
                console.log('Disconnected');
            }
        }
        
        function subscribeToCompany() {
            if (!stompClient) {
                alert('Please connect first');
                return;
            }
            
            const companyId = document.getElementById('company-id').value;
            if (!companyId) {
                alert('Please enter a company ID');
                return;
            }
            
            const topic = `/topic/transactions/company/${companyId}`;
            const subscription = stompClient.subscribe(topic, onMessageReceived);
            subscriptions.push(subscription);
            
            addMessage(`Subscribed to ${topic}`);
        }
        
        function subscribeToStaff() {
            if (!stompClient) {
                alert('Please connect first');
                return;
            }
            
            const staffId = document.getElementById('staff-id').value;
            if (!staffId) {
                alert('Please enter a staff ID');
                return;
            }
            
            const topic = `/topic/transactions/staff/${staffId}`;
            const subscription = stompClient.subscribe(topic, onMessageReceived);
            subscriptions.push(subscription);
            
            addMessage(`Subscribed to ${topic}`);
        }
        
        function subscribeToDevice() {
            if (!stompClient) {
                alert('Please connect first');
                return;
            }
            
            const deviceId = document.getElementById('device-id').value;
            if (!deviceId) {
                alert('Please enter a device ID');
                return;
            }
            
            const topic = `/topic/transactions/device/${deviceId}`;
            const subscription = stompClient.subscribe(topic, onMessageReceived);
            subscriptions.push(subscription);
            
            addMessage(`Subscribed to ${topic}`);
        }
        
        function subscribeToAll() {
            if (!stompClient) {
                alert('Please connect first');
                return;
            }
            
            const topic = '/topic/transactions';
            const subscription = stompClient.subscribe(topic, onMessageReceived);
            subscriptions.push(subscription);
            
            addMessage(`Subscribed to ${topic}`);
        }
        
        function onMessageReceived(message) {
            const messageBody = JSON.parse(message.body);
            console.log('Received message:', messageBody);
            
            const messageElement = document.createElement('div');
            messageElement.className = 'message';
            
            const timestamp = new Date(messageBody.timestamp).toLocaleString();
            
            messageElement.innerHTML = `
                <strong>Transaction Notification</strong><br>
                <strong>Time:</strong> ${timestamp}<br>
                <strong>Type:</strong> ${messageBody.type}<br>
                <strong>Transaction ID:</strong> ${messageBody.transactionId}<br>
                <strong>Amount:</strong> ${messageBody.amount}<br>
                <strong>Status:</strong> ${messageBody.status}<br>
                <strong>Company:</strong> ${messageBody.companyName} (ID: ${messageBody.companyId})<br>
                <strong>Device:</strong> ${messageBody.deviceName} (ID: ${messageBody.deviceId})<br>
                ${messageBody.staffName ? `<strong>Staff:</strong> ${messageBody.staffName} (ID: ${messageBody.staffId})<br>` : ''}
                <pre>${JSON.stringify(messageBody, null, 2)}</pre>
            `;
            
            document.getElementById('messages').prepend(messageElement);
        }
        
        function addMessage(text) {
            const messageElement = document.createElement('div');
            messageElement.className = 'message';
            messageElement.textContent = text;
            document.getElementById('messages').prepend(messageElement);
        }
    </script>
</body>
</html>
