# Dependabot configuration file for Vend application
# This configuration will check for updates to Maven dependencies weekly

version: 2
updates:
  # Configuration for Maven dependencies
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    # Limit the number of open pull requests to avoid overwhelming maintainers
    open-pull-requests-limit: 10
    # Assign labels to pull requests
    labels:
      - "dependencies"
      - "security"
    # Set reviewers for pull requests
    # reviewers:
    #   - "your-github-username"
    # Group all updates together to reduce noise
    groups:
      spring-framework:
        patterns:
          - "org.springframework*"
        update-types:
          - "minor"
          - "patch"
      test-dependencies:
        patterns:
          - "*test*"
          - "*mock*"
        update-types:
          - "minor"
          - "patch"
    # Ignore certain dependencies if needed
    # ignore:
    #   - dependency-name: "org.some-dependency"
    #     versions: ["1.x", "2.x"]
    
    # Set the target branch for pull requests
    target-branch: "main"
    
    # Set the versioning strategy
    versioning-strategy: "auto"
    
    # Allow only security updates
    # security-updates-only: true
    
    # Set the commit message prefix
    commit-message:
      prefix: "deps"
      include: "scope"