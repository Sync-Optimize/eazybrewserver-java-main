
name: Java CI/CD with Maven and SSH Deploy

env:
  ACTIONS_STEP_DEBUG: true

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build with Maven
        run: mvn -B package --file pom.xml
      - name: Upload dependency graph
        uses: advanced-security/maven-dependency-submission-action@v2

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build JAR (skip tests)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - run: mvn -B package --file pom.xml -DskipTests

      - name: Set up SSH key & known_hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/id_rsa
          echo "${{ secrets.KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Create remote dir
        run: |
          ssh -v "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}" \
            "mkdir -p /root/app"

#      - name: Stop existing app
#        run: |
#          ssh -v "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}" \
#            "pkill -f '/root/app/vend-0.0.1-SNAPSHOT.jar' || true"


      - name: Stop existing app
        run: |
          ssh -v "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}" << 'EOF'
            # build the command as a string
            cmd="ps -ef | grep '[j]ava -jar .*vend-0.0.1-SNAPSHOT.jar' | awk '{print \$2}'"

            # print the command we’re about to run
            echo "Running PID lookup command:"
            echo "  $cmd"

            # run it and capture the PIDs
            pids=$(eval "$cmd")

            # show what we found
            echo "Found PIDs: $pids"

            if [ -n "$pids" ]; then
              echo "Killing existing app process(es): $pids"
              kill $pids || true
            else
              echo "No running app process found."
            fi
          EOF

      - name: Remove old JAR
        run: |
          ssh -v "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}" \
            "rm -f /root/app/vend-0.0.1-SNAPSHOT.jar || true"

      - name: Upload new JAR
        run: |
          scp -v target/vend-0.0.1-SNAPSHOT.jar \
            "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/root/app/"

#      - name: Start application
#        run: |
#          ssh -v "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}" \
#            "cd /root/app && setsid nohup java -jar vend-0.0.1-SNAPSHOT.jar > appnew.log 2>&1 < /dev/null &"
      - name: Start application
        run: |
          ssh -v "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}" \
            "cd /root/app && tmux new-session -d -s vend 'java -jar vend-0.0.1-SNAPSHOT.jar > appnew8.log 2>&1'"

      - name: Verify deployment
        run: |
          ssh -v "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}" \
            "ps aux | grep 'vend-0.0.1-SNAPSHOT.jar' || echo '⚠️ App not found running'"
